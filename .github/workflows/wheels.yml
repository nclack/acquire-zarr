name: Wheels

on:
  push:
    branches: [main, shim]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  cpu-wheel:
    name: CPU wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build wheel
        run: docker build -f shim/Dockerfile --target wheel --output wheels .

      - uses: actions/upload-artifact@v4
        with:
          name: acquire-zarr-cpu-wheel
          path: wheels/*.whl

  gpu-wheel:
    name: GPU wheel
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build wheel
        run: docker build -f shim/Dockerfile.gpu --target wheel --output wheels-gpu .

      - uses: actions/upload-artifact@v4
        with:
          name: acquire-zarr-gpu-wheel
          path: wheels-gpu/*.whl
