name: Run comparison benchmarks
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  run-benchmark:
    name: Benchmark on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - "windows-latest"
          - "ubuntu-latest"
          - "ubuntu-24.04-arm"
          - "macos-latest" # arm
          - "macos-15-intel" # x86_64
        include:
          - platform: "ubuntu-latest"
            vcpkg_triplet: "x64-linux"
          - platform: "windows-latest"
            vcpkg_triplet: "x64-windows-static"
          - platform: "macos-latest"
            vcpkg_triplet: "arm64-osx"
          - platform: "macos-15-intel"
            vcpkg_triplet: "x64-osx"
          - platform: "ubuntu-24.04-arm"
            vcpkg_triplet: "arm64-linux"
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.3"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            !vcpkg/downloads
            !vcpkg/buildtrees
            !vcpkg/packages
            !vcpkg/installed
          key: vcpkg-2025.03.19-${{ runner.os }}-${{ runner.arch }}

      - name: Install vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19
          fi
          cd vcpkg
          if [ ! -f ./vcpkg ] && [ ! -f ./vcpkg.exe ]; then
            ./bootstrap-vcpkg.sh
          fi
          echo "VCPKG_ROOT=${{github.workspace}}/vcpkg" >> $GITHUB_ENV
          echo "${{github.workspace}}/vcpkg" >> $GITHUB_PATH
          ./vcpkg integrate install
        shell: bash

      - name: Install OpenMP
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install libomp

      - name: Install dependencies
        run: uv pip install --system "pybind11[global]" "cmake<4.0.0" ninja setuptools wheel tensorstore click rich psutil

      - name: Build and install Python bindings
        run: uv pip install --system --no-build-isolation ".[testing]"

      - name: Run benchmark
        run: python benchmarks/benchmark.py --nocompare --output benchmark-${{ matrix.platform }}-${{ github.sha }}.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.platform }}-${{ github.sha }}
          path: benchmark-${{ matrix.platform }}-${{ github.sha }}.json

  generate-plots:
    name: Generate benchmark plots
    needs: run-benchmark
    runs-on: ubuntu-latest
    if: always()  # Run even if some benchmark jobs fail

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.3"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install plotting dependencies
        run: uv pip install --system matplotlib click

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: benchmark-results
          merge-multiple: true

      - name: Generate plots
        run: python benchmarks/plot_benchmarks.py --input-dir benchmark-results --output-prefix benchmark_comparison

      - name: Upload plot
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-plots-${{ github.sha }}
          path: benchmark_comparison_*.png