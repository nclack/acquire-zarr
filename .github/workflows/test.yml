name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  SCCACHE_GHA_ENABLED: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        platform:
          - "ubuntu-latest"
          - "ubuntu-24.04-arm"
          - "windows-latest"
          - "macos-latest" # arm
          - "macos-15-intel" # x86_64
        include:
          - platform: "ubuntu-latest"
            vcpkg_triplet: "x64-linux"
          - platform: "ubuntu-24.04-arm"
            vcpkg_triplet: "arm64-linux"
          - platform: "windows-latest"
            vcpkg_triplet: "x64-windows-static"
          - platform: "macos-latest"
            vcpkg_triplet: "arm64-osx"
          - platform: "macos-15-intel"
            vcpkg_triplet: "x64-osx"
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install CMake 3.31
        if: matrix.platform != 'ubuntu-24.04-arm'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Install CMake 3.31 for ARM
        if: matrix.platform == 'ubuntu-24.04-arm'
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.8/cmake-3.31.8-linux-aarch64.tar.gz
          tar -xzf cmake-3.31.8-linux-aarch64.tar.gz
          sudo mv cmake-3.31.8-linux-aarch64 /opt/cmake
          echo "/opt/cmake/bin" >> $GITHUB_PATH

      - name: Set up sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Export sccache launcher
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          echo "SCCACHE_LAUNCHER=-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            !vcpkg/downloads
            !vcpkg/buildtrees
            !vcpkg/packages
            !vcpkg/installed
          key: vcpkg-2025.03.19-${{ runner.os }}-${{ runner.arch }}

      - name: Install vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19
          fi
          cd vcpkg
          if [ ! -f ./vcpkg ] && [ ! -f ./vcpkg.exe ]; then
            ./bootstrap-vcpkg.sh
          fi
          echo "VCPKG_ROOT=${{github.workspace}}/vcpkg" >> $GITHUB_ENV
          echo "${{github.workspace}}/vcpkg" >> $GITHUB_PATH
          ./vcpkg integrate install
        shell: bash

      - name: Install OpenMP
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install libomp

      - name: Configure CMake
        run: |
          cmake --preset=default -DVCPKG_TARGET_TRIPLET=${{matrix.vcpkg_triplet}} ${{ env.SCCACHE_LAUNCHER }}
          cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{ env.SCCACHE_LAUNCHER }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{env.BUILD_TYPE}} -L acquire-zarr --output-on-failure

  test_s3:
    name: Test S3
    runs-on: ubuntu-latest
    env:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_URL: http://localhost:9000
      MINIO_ALIAS: myminio
      MINIO_BUCKET: acquire-test
      MINIO_ACCESS_KEY: acquire
      MINIO_SECRET_KEY: 12345678

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install CMake 3.31
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Set up sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Export sccache launcher
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          echo "SCCACHE_LAUNCHER=-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_ARGS=-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install minio and mcli
        run: |
          apt update && apt install -y tmux wget
          wget https://dl.min.io/server/minio/release/linux-amd64/minio -O /usr/local/bin/minio
          wget https://dl.min.io/client/mc/release/linux-amd64/mc -O /usr/local/bin/mcli
          chmod +x /usr/local/bin/minio
          chmod +x /usr/local/bin/mcli

      - name: Start minio in tmux
        run: |
          tmux new -d -s minio
          tmux send-keys -t minio "MINIO_ROOT_USER=$MINIO_ROOT_USER MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD minio server /tmp/minio --console-address :9001" Enter
          sleep 5
          mcli alias set $MINIO_ALIAS $MINIO_URL $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
          mcli admin user svcacct add --access-key $MINIO_ACCESS_KEY --secret-key $MINIO_SECRET_KEY $MINIO_ALIAS $MINIO_ROOT_USER

      - name: Create a bucket
        run: |
          mcli mb $MINIO_ALIAS/$MINIO_BUCKET

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            !vcpkg/downloads
            !vcpkg/buildtrees
            !vcpkg/packages
            !vcpkg/installed
          key: vcpkg-2025.03.19-${{ runner.os }}-${{ runner.arch }}

      - name: Install vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19
          fi
          cd vcpkg
          if [ ! -f ./vcpkg ] && [ ! -f ./vcpkg.exe ]; then
            ./bootstrap-vcpkg.sh
          fi
          echo "VCPKG_ROOT=${{github.workspace}}/vcpkg" >> $GITHUB_ENV
          echo "${{github.workspace}}/vcpkg" >> $GITHUB_PATH
          ./vcpkg integrate install
        shell: bash

      - name: Configure CMake
        run: |
          cmake --preset=default ${{ env.SCCACHE_LAUNCHER }}
          cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{ env.SCCACHE_LAUNCHER }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test C++
        working-directory: ${{github.workspace}}/build
        env:
          ZARR_S3_ENDPOINT: ${{ env.MINIO_URL }}
          ZARR_S3_BUCKET_NAME: ${{ env.MINIO_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ env.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ env.MINIO_SECRET_KEY }}
        run: ctest -C ${{env.BUILD_TYPE}} -L s3 --output-on-failure

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install "pybind11[global]" "cmake<4.0.0" ninja setuptools wheel numpy pytest pytest-timeout pytest-randomly
        shell: bash

      - name: Build and install Python bindings
        run: uv pip install --no-build-isolation ".[testing]"
        shell: bash

      - name: Test Python
        run: uv run --no-sync pytest -v -k test_stream_data_to_s3
        shell: bash


  test-python:
    name: Test Python on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        platform:
          - "ubuntu-latest"
          - "ubuntu-24.04-arm"
          - "windows-latest"
          - "macos-latest" # arm
          - "macos-15-intel" # x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13.3"

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            !vcpkg/downloads
            !vcpkg/buildtrees
            !vcpkg/packages
            !vcpkg/installed
          key: vcpkg-2025.03.19-${{ runner.os }}-${{ runner.arch }}

      - name: Install vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19
          fi
          cd vcpkg
          if [ ! -f ./vcpkg ] && [ ! -f ./vcpkg.exe ]; then
            ./bootstrap-vcpkg.sh
          fi
          echo "VCPKG_ROOT=${{github.workspace}}/vcpkg" >> $GITHUB_ENV
          echo "${{github.workspace}}/vcpkg" >> $GITHUB_PATH
          ./vcpkg integrate install
        shell: bash

      - name: Install OpenMP
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install libomp

      - name: Set up sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Export sccache launcher
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          echo "CMAKE_ARGS=-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          uv venv
          uv pip install "pybind11[global]" "cmake<4.0.0" ninja setuptools wheel numpy pytest pytest-timeout pytest-randomly
        shell: bash

      - name: Build and install Python bindings
        run: uv pip install --no-build-isolation ".[testing]"
        shell: bash

      - name: Run tests (POSIX)
        if: runner.os != 'Windows'
        run: uv run --no-sync pytest -v --durations=10 --timeout=120 --timeout-method=signal -o faulthandler_timeout=120
        shell: bash

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: uv run --no-sync pytest -v --durations=10 --timeout=120 --timeout-method=thread -o faulthandler_timeout=120
        shell: bash
