name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "nightly"

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    strategy:
      matrix:
        platform:
          - "windows-latest"
          - "ubuntu-latest"
          - "ubuntu-24.04-arm"
          - "macos-latest"
          - "macos-15-intel"
        include:
          - platform: "windows-latest"
            vcpkg_triplet: "x64-windows-static"
          - platform: "ubuntu-latest"
            vcpkg_triplet: "x64-linux"
          - platform: "ubuntu-24.04-arm"
            vcpkg_triplet: "arm64-linux"
          - platform: "macos-latest"
            vcpkg_triplet: "arm64-osx"
          - platform: "macos-15-intel"
            vcpkg_triplet: "x64-osx"

    runs-on: ${{ matrix.platform }}

    permissions:
      actions: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.platform }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install CMake 3.31
        if: matrix.platform != 'ubuntu-24.04-arm'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Install CMake 3.31 for ARM
        if: matrix.platform == 'ubuntu-24.04-arm'
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.8/cmake-3.31.8-linux-aarch64.tar.gz
          tar -xzf cmake-3.31.8-linux-aarch64.tar.gz
          sudo mv cmake-3.31.8-linux-aarch64 /opt/cmake
          echo "/opt/cmake/bin" >> $GITHUB_PATH

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19
          cd vcpkg && ./bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{github.workspace}}/vcpkg" >> $GITHUB_ENV
          echo "${{github.workspace}}/vcpkg" >> $GITHUB_PATH
          ./vcpkg integrate install
        shell: bash

      - name: Install OpenMP
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install libomp

      - name: Build
        run: |
          cmake --preset=default -DVCPKG_TARGET_TRIPLET=${{matrix.vcpkg_triplet}} -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ${{github.workspace}}/build --config Release

      - name: Test  # don't release if tests are failing
        working-directory: ${{github.workspace}}/build
        run: ctest -C Release -L anyplatform --output-on-failure

      - name: Package
        run: |
          cmake --preset=default -DVCPKG_TARGET_TRIPLET=${{matrix.vcpkg_triplet}} -B ${{github.workspace}}/pack -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build ${{github.workspace}}/pack --config Release
          cpack --config ${{github.workspace}}/pack/CPackConfig.cmake -C Release -G ZIP

      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.platform}} binaries
          path: ${{github.workspace}}/*.zip

  build-wheel:
    name: Build Python ${{ matrix.python }} wheel on ${{ matrix.platform }}
    strategy:
      matrix:
        platform:
          - "windows-latest"
          - "macos-latest" # arm
          - "macos-15-intel" # x86_64
          - "ubuntu-22.04"
          - "ubuntu-22.04-arm"
        python:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        include:
          - platform: "windows-latest"
            arch: "x86_64"
          - platform: "macos-latest"
            arch: "aarch64"
          - platform: "macos-15-intel"
            arch: "x86_64"
          - platform: "ubuntu-22.04"
            arch: "x86_64"
          - platform: "ubuntu-22.04-arm"
            arch: "aarch64"
          - python: "3.10"
            cp_ver: cp310
          - python: "3.11"
            cp_ver: cp311
          - python: "3.12"
            cp_ver: cp312
          - python: "3.13"
            cp_ver: cp313
          - python: "3.14"
            cp_ver: cp314

    runs-on: ${{ matrix.platform }}

    permissions:
      actions: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.platform }}-${{ matrix.python }}-build-wheel
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install vcpkg
        if: ${{ !startsWith(matrix.platform, 'ubuntu') }} # vcpkg will be installed in the manylinux image for Ubuntu builds
        run: |
          git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19
          cd vcpkg && ./bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{github.workspace}}/vcpkg" >> $GITHUB_ENV
          echo "${{github.workspace}}/vcpkg" >> $GITHUB_PATH
          ./vcpkg integrate install
        shell: bash

      - name: Install dependencies
        run: python -m pip install -U pip "pybind11[global]" "cmake<4.0.0" build auditwheel

      - name: macOS fixes
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install libomp
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "ARCHFLAGS=-arch arm64" >> $GITHUB_ENV
            echo "_PYTHON_HOST_PLATFORM=macosx-15.0-arm64" >> $GITHUB_ENV
          else
            echo "ARCHFLAGS=-arch x86_64" >> $GITHUB_ENV
            echo "_PYTHON_HOST_PLATFORM=macosx-15.0-x86_64" >> $GITHUB_ENV
          fi

      - name: Build
        if: ${{ !startsWith(matrix.platform, 'ubuntu') }}
        run: python -m build -o dist

      - name: Build (manylinux)
        if: startsWith(matrix.platform, 'ubuntu')
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "${{ matrix.cp_ver }}-*"
          CIBW_SKIP: "*-musllinux*"  # Skip musllinux builds
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_BUILD: >-
            yum install -y ninja-build gcc-toolset-11-gcc gcc-toolset-11-gcc-c++ perl-IPC-Cmd &&
            source /opt/rh/gcc-toolset-11/enable &&
            git clone https://github.com/microsoft/vcpkg.git -b 2025.03.19 &&
            cd vcpkg &&
            CMAKE_POLICY_VERSION_MINIMUM=3.5 ./bootstrap-vcpkg.sh &&
            ./vcpkg integrate install
          CIBW_ENVIRONMENT: >-
            VCPKG_ROOT=/project/vcpkg
            PATH=/opt/rh/gcc-toolset-11/root/usr/bin:$PATH
            CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
            Python3_EXECUTABLE="/opt/python/${{ matrix.cp_ver }}-${{ matrix.cp_ver }}/bin/python"
            Python3_INCLUDE_DIR="/opt/python/${{ matrix.cp_ver }}-${{ matrix.cp_ver }}/include/python${{ matrix.python }}"
            Python3_LIBRARY="/opt/python/${{ matrix.cp_ver }}-${{ matrix.cp_ver }}/lib/libpython${{ matrix.python }}.a"
        with:
          output-dir: dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.platform}} ${{matrix.arch}} wheel (Python ${{ matrix.python }})
          path: ${{github.workspace}}/dist/*.whl

  release:
    needs:
      - build
      - build-wheel
    name: "Release"
    runs-on: "ubuntu-latest"

    environment:
      name: pypi
      url: https://pypi.org/p/acquire-zarr

    permissions: write-all

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        id: download
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Collect wheels
        run: |
          mkdir -p dist
          mv ${{steps.download.outputs.download-path}}/*/*.whl dist
          find ${{steps.download.outputs.download-path}}/ -type f -name *.tar.gz -exec mv {} dist \; -quit

      - name: Tagged release
        if: github.ref_name != 'nightly'
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ github.token }}
          prerelease: false
          files: |
            ${{steps.download.outputs.download-path}}/*/*.zip
            dist/*.whl

      - name: Nightly release
        if: github.ref_name == 'nightly'
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.PAT }}
          automatic_release_tag: "nightly"
          prerelease: true
          title: "Nightly Release"
          files: |
            ${{steps.download.outputs.download-path}}/*/*.zip
            dist/*.whl

      - name: Publish wheels and sources
        if: github.ref_name != 'nightly'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
